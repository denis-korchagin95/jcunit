name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Build testers
        run: make build-testers

      - name: Run tests
        run: ./bin/jcunit --no-cache ./tests
